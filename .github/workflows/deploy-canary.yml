name: Deploy canary

# After a production deployment becomes READY, Vercel promotes it immediately.
# This canary proves the promoted deployment has actually executed a completed
# monitor-check cron under its own release identity after the promotion
# boundary (Pack 2 release-bound proof). It does not merely poke the cron
# routes and trust a completed/duplicate status from any release.

on:
  deployment_status:

permissions:
  contents: write # create a commit comment on failure
  actions: read

jobs:
  canary:
    name: Release deploy proof
    # Only real, promoted production deployments. Skip previews and non-success.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture promotion boundary and identity
        id: meta
        env:
          # Prefer the deployment_status timestamp as the promotion boundary so
          # runs that finished before this deployment became READY never qualify.
          STATUS_CREATED_AT: ${{ github.event.deployment_status.created_at }}
        run: |
          set -euo pipefail
          if [ -n "${STATUS_CREATED_AT:-}" ]; then
            boundary="${STATUS_CREATED_AT}"
          else
            boundary="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "boundary=${boundary}" >> "$GITHUB_OUTPUT"
          echo "Promotion boundary: ${boundary}"
          # Deployment identity for diagnostics. Exact match is enforced against
          # the server-reported PULSE_RELEASE_ID once deploy-proof responds.
          echo "sha=${{ github.event.deployment.sha }}" >> "$GITHUB_OUTPUT"

      - name: Verify release-bound deploy proof
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AFTER: ${{ steps.meta.outputs.boundary }}
          # Optional: pin expected Vercel deployment id when the secret is set.
          # When unset, the script accepts the live server's releaseId and still
          # requires ready + completedAt >= AFTER.
          EXPECTED_RELEASE_ID: ${{ vars.EXPECTED_RELEASE_ID }}
          MAX_ATTEMPTS: "20"
          SLEEP_SECONDS: "6"
          SHA: ${{ github.event.deployment.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::PRODUCTION_URL and CRON_SECRET secrets must be set"
            exit 1
          fi

          set +e
          node scripts/verify-deploy-proof.mjs
          rc=$?
          set -e

          if [ "$rc" -ne 0 ]; then
            REASON="release-bound deploy proof failed for after=${AFTER}"
            echo "::error::Canary failed: ${REASON}"
            if [ -n "${SHA:-}" ]; then
              jq -nc --arg b "Deploy canary failed: ${REASON}" '{body:$b}' \
                | gh api --method POST \
                  "repos/${GITHUB_REPOSITORY}/commits/${SHA}/comments" \
                  --input - >/dev/null 2>&1 || echo "could not post commit comment"
            fi
            exit 1
          fi

          echo "Release-bound deploy proof passed."
