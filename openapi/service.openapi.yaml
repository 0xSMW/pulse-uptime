    "/api/v1/database-health": {
      "get": {
        "operationId": "getDatabaseHealth",
        "tags": [
          "Database Health"
        ],
        "summary": "Get database health",
        "description": "Returns the latest usable measurement. A stale snapshot remains available with health UNKNOWN and freshness.stale set to true.",
        "x-required-scopes": [
          "config:read"
        ],
        "security": [
          {
            "bearerAuth": []
          },
          {
            "humanSession": []
          }
        ],
        "parameters": [
          {
            "$ref": "#/components/parameters/RequestId"
          }
        ],
        "responses": {
          "200": {
            "description": "Current, cached, or stale database health",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/DatabaseHealthEnvelope"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/AuthenticationRequired"
          },
          "403": {
            "$ref": "#/components/responses/ScopeDenied"
          },
          "429": {
            "$ref": "#/components/responses/RateLimited"
          },
          "503": {
            "description": "No usable snapshot or provider measurement is available",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorEnvelope"
                }
              }
            },
            "x-error-codes": [
              "DATABASE_HEALTH_UNAVAILABLE"
            ]
          }
        }
      }
    },
