      "EmailChangeEnvelope": {
        "type": "object",
        "additionalProperties": false,
        "required": ["apiVersion", "kind", "data", "meta"],
        "properties": {
          "apiVersion": {"$ref": "#/components/schemas/ApiVersion"},
          "kind": {"const": "EmailChange"},
          "data": {"$ref": "#/components/schemas/EmailChange"},
