        "required": ["name", "layout", "theme", "logoLightImageId", "logoDarkImageId", "faviconImageId", "homepageUrl", "contactUrl", "navLinks", "googleTagId", "customCss", "customHead", "announcementEnabled", "announcementMarkdown", "historyDays", "uptimeDecimals", "unknownAsOperational", "minIncidentSeconds", "timezone", "version"],
        "properties": {
          "name": {"type": "string", "minLength": 1, "maxLength": 80},
          "layout": {"enum": ["vertical", "horizontal"]},
          "theme": {"enum": ["system", "light", "dark"]},
          "logoLightImageId": {"type": ["string", "null"], "format": "uuid", "description": "Must reference an uploaded logo-light image"},
          "logoDarkImageId": {"type": ["string", "null"], "format": "uuid", "description": "Must reference an uploaded logo-dark image"},
          "faviconImageId": {"type": ["string", "null"], "format": "uuid", "description": "Must reference an uploaded favicon image (32 KB cap; inlined as a data: URI)"},
          "homepageUrl": {"type": ["string", "null"], "maxLength": 2048, "description": "http or https URL"},
          "contactUrl": {"type": ["string", "null"], "maxLength": 2048, "description": "http, https, or mailto URL"},
          "navLinks": {"type": "array", "maxItems": 8, "items": {"$ref": "#/components/schemas/StatusPageNavLink"}},
          "googleTagId": {"type": ["string", "null"], "pattern": "^G(T)?-[A-Z0-9]+$", "maxLength": 40},
          "customCss": {"type": ["string", "null"], "description": "At most 10 KB; injected as a style element on the public status page (accepted self-XSS for the single operator, see SECURITY.md)"},
          "customHead": {"type": ["string", "null"], "description": "At most 10 KB; restricted fragment of meta and icon-related link elements only. Parsed on write and again on render as inert React nodes, never raw HTML. Scripts, event handlers, and other tags are rejected."},
          "announcementEnabled": {"type": "boolean"},
          "announcementMarkdown": {"type": ["string", "null"], "description": "At most 2 KB; restricted markdown"},
          "historyDays": {"enum": [30, 60, 90]},
          "uptimeDecimals": {"type": "integer", "minimum": 0, "maximum": 3},
          "unknownAsOperational": {"type": "boolean"},
          "minIncidentSeconds": {"type": "integer", "minimum": 0, "maximum": 604800, "description": "Hides resolved blips shorter than this from incident history only"},
          "timezone": {"type": ["string", "null"], "description": "IANA time zone; null renders UTC"},
          "updatedAt": {"type": ["string", "null"], "format": "date-time", "readOnly": true, "description": "Last write time, for display only; ignored when sent on PUT"},
          "version": {"type": "integer", "minimum": 0, "readOnly": true, "description": "Monotonic optimistic-concurrency counter; drives the ETag (as a quoted string) and is ignored when sent on PUT"}
        }
      },
