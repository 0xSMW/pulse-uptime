            "type": ["string", "null"],
            "format": "uuid",
            "description": "References an uploaded kind=avatar image; null when unset."
          }
        }
      },
      "ProfileUpdateRequest": {
        "type": "object",
        "additionalProperties": false,
        "minProperties": 1,
        "properties": {
          "name": {"type": "string", "minLength": 1, "maxLength": 120},
          "timezone": {"type": ["string", "null"], "description": "IANA zone name; null resets the account to the system zone."},
          "avatarImageId": {
            "type": ["string", "null"],
            "format": "uuid",
            "description": "Must reference an uploaded kind=avatar image; null clears the avatar."
