    "/api/v1/status-page-config": {
      "get": {
        "operationId": "getStatusPageConfig",
        "tags": ["Status page"],
        "summary": "Get status page configuration",
        "x-required-scopes": ["config:read"],
        "security": [{"bearerAuth": []}, {"humanSession": []}],
        "parameters": [{"$ref": "#/components/parameters/RequestId"}],
        "responses": {
          "200": {
            "description": "The status page configuration document",
            "headers": {"ETag": {"description": "Quoted version-derived configuration ETag; resend in If-Match on PUT", "schema": {"type": "string"}}},
            "content": {"application/json": {"schema": {"$ref": "#/components/schemas/StatusPageConfigEnvelope"}}}
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "429": {"$ref": "#/components/responses/RateLimited"},
          "503": {"description": "The seeded configuration row is missing (run migrations)", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrorEnvelope"}}}}
        }
      },
      "put": {
        "operationId": "replaceStatusPageConfig",
        "tags": ["Status page"],
        "summary": "Replace status page configuration",
        "description": "Full-document replacement guarded by optimistic concurrency: If-Match must carry the ETag from the last read (428 PRECONDITION_REQUIRED when missing, 412 PRECONDITION_FAILED on mismatch). The read-only updatedAt field in the body is ignored. Referenced logo and favicon image ids must exist with the matching kind; image rows dropped by the new document are deleted after the write commits.",
        "x-required-scopes": ["config:write"],
        "security": [{"bearerAuth": []}, {"humanSession": []}],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"name": "If-Match", "in": "header", "required": true, "schema": {"type": "string"}, "description": "Quoted version-derived ETag captured on the last read"}
        ],
        "requestBody": {"required": true, "content": {"application/json": {"schema": {"$ref": "#/components/schemas/StatusPageConfig"}}}},
        "responses": {
          "200": {
            "description": "The stored configuration document",
            "headers": {"ETag": {"description": "The new version-derived configuration ETag", "schema": {"type": "string"}}},
            "content": {"application/json": {"schema": {"$ref": "#/components/schemas/StatusPageConfigEnvelope"}}}
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "412": {"description": "The configuration changed since it was read; re-read and reapply", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrorEnvelope"}}}},
          "428": {"description": "The If-Match header is missing", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrorEnvelope"}}}},
          "429": {"$ref": "#/components/responses/RateLimited"},
          "503": {"description": "The seeded configuration row is missing (run migrations)", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ErrorEnvelope"}}}}
        }
      }
    },
