      "DatabaseHealth": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "health",
          "summary",
          "budgetBytes",
          "usedBytes",
          "availableBytes",
          "projected30DayBytes",
          "categories",
          "retention",
          "governor",
          "schedulerCoverage",
          "transfer",
          "freshness",
          "maintenanceHealthy",
          "refresh"
        ],
        "properties": {
          "health": {
            "type": "string",
            "enum": [
              "HEALTHY",
              "WATCHING",
              "OPTIMIZING",
              "PROTECTING",
              "CRITICAL",
              "UNKNOWN"
            ]
          },
          "summary": {
            "type": "string"
          },
          "budgetBytes": {
            "type": "integer",
            "const": 500000000
          },
          "usedBytes": {
            "type": ["integer", "null"],
            "minimum": 0
          },
          "availableBytes": {
            "type": ["integer", "null"]
          },
          "projected30DayBytes": {
            "type": ["integer", "null"],
            "minimum": 0
          },
          "categories": {
            "type": "array",
            "items": {
              "type": "object",
              "additionalProperties": false,
              "required": ["key", "label", "bytes"],
              "properties": {
                "key": {
                  "type": "string",
                  "enum": [
                    "recentCheckBatches",
                    "rollups",
                    "exceptions",
                    "incidents",
                    "coreData",
                    "operations",
                    "indexes",
                    "other"
                  ]
                },
                "label": {
                  "type": "string"
                },
                "bytes": {
                  "type": "integer",
                  "minimum": 0
                }
              }
            }
          },
          "retention": {
            "type": "array",
            "items": {
              "type": "object",
              "additionalProperties": false,
              "required": ["key", "label", "configuredSeconds", "oldestAt"],
              "properties": {
                "key": {
                  "type": "string"
                },
                "label": {
                  "type": "string"
                },
                "configuredSeconds": {
                  "type": ["integer", "null"],
                  "minimum": 0
                },
                "oldestAt": {
                  "type": ["string", "null"],
                  "format": "date-time"
                }
              }
            }
          },
          "governor": {
            "type": "object",
            "additionalProperties": false,
            "required": ["mode", "action", "lastCompactionAt"],
            "properties": {
              "mode": {
                "type": "string",
                "enum": [
                  "FULL_DETAIL",
                  "EARLY_COMPACTION",
                  "SHORTENED_RETENTION",
                  "INCIDENT_HOURLY_ONLY",
                  "ESSENTIALS_ONLY",
                  "UNKNOWN"
                ]
              },
              "action": {
                "type": "string"
              },
              "lastCompactionAt": {
                "type": ["string", "null"],
                "format": "date-time"
              }
            }
          },
          "schedulerCoverage": {
            "type": ["number", "null"],
            "minimum": 0,
            "maximum": 1
          },
          "transfer": {
            "type": "object",
            "additionalProperties": false,
            "required": ["usedBytes", "budgetBytes", "projectedBytes"],
            "properties": {
              "usedBytes": {
                "type": ["integer", "null"],
                "minimum": 0
              },
              "budgetBytes": {
                "type": "integer",
                "const": 5000000000
              },
              "projectedBytes": {
                "type": ["integer", "null"],
                "minimum": 0
              }
            }
          },
          "freshness": {
            "type": "object",
            "additionalProperties": false,
            "required": ["capturedAt", "ageSeconds", "stale", "providerMetricsAvailable", "providerCapturedAt", "providerAgeSeconds"],
            "properties": {
              "capturedAt": {
                "type": ["string", "null"],
                "format": "date-time"
              },
              "ageSeconds": {
                "type": ["integer", "null"],
                "minimum": 0
              },
              "stale": {
                "type": "boolean",
                "description": "True when the returned snapshot is older than the service freshness threshold. Stale snapshots use health UNKNOWN."
              },
              "providerMetricsAvailable": {
                "type": "boolean"
              },
              "providerCapturedAt": {
                "type": ["string", "null"],
                "format": "date-time"
              },
              "providerAgeSeconds": {
                "type": ["integer", "null"],
                "minimum": 0
              }
            }
          },
          "maintenanceHealthy": {
            "type": ["boolean", "null"]
          },
          "refresh": {
            "type": "object",
            "additionalProperties": false,
            "required": ["cached", "status", "nextEligibleAt"],
            "properties": {
              "cached": {
                "type": "boolean",
                "description": "True when the 15-minute refresh cache served this response without a new provider measurement."
              },
              "status": {
                "type": "string",
                "enum": ["CURRENT", "CACHED", "STALE_FALLBACK"],
                "description": "Indicates whether the response is current, cache-served, or a prior snapshot retained after refresh failure."
              },
              "nextEligibleAt": {
                "type": ["string", "null"],
                "format": "date-time"
              }
            }
          }
        }
      },
      "ConfigurationMeta": {
        "type": "object",
