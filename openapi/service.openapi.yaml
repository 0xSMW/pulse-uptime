            ],
            "format": "date-time"
          }
        }
      },
      "CreatedTokenEnvelope": {
        "type": "object",
        "required": [
          "apiVersion",
          "kind",
          "data",
          "meta"
        ],
        "properties": {
          "apiVersion": {
            "$ref": "#/components/schemas/ApiVersion"
          },
          "kind": {
            "const": "CreatedToken"
          },
          "data": {
            "allOf": [
              {
                "$ref": "#/components/schemas/Token"
              },
              {
                "type": "object",
                "required": [
                  "token"
                ],
                "properties": {
                  "token": {
                    "type": "string"
                  }
                }
              }
            ]
          },
          "meta": {
            "$ref": "#/components/schemas/Meta"
          }
        }
      },
      "TokenListEnvelope": {
        "type": "object",
        "required": [
          "apiVersion",
          "kind",
          "data",
          "meta"
        ],
        "properties": {
          "apiVersion": {
            "$ref": "#/components/schemas/ApiVersion"
          },
          "kind": {
            "const": "TokenList"
          },
          "data": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/Token"
            }
          },
          "meta": {
            "$ref": "#/components/schemas/ListMeta"
          }
        }
      },
      "DeviceAuthorizationRequest": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "clientName",
          "installationKey",
          "installationName",
          "clientVersion",
          "platform",
          "architecture",
          "scopeProfile"
        ],
        "properties": {
          "clientName": {
            "type": "string",
            "const": "pulsectl"
          },
          "installationKey": {
            "type": "string"
          },
          "installationName": {
            "type": "string"
          },
          "clientVersion": {
            "type": "string"
          },
          "platform": {
            "type": "string"
          },
          "architecture": {
            "type": "string"
          },
          "scopeProfile": {
            "type": "string",
            "const": "administrator"
          }
        }
      },
      "DeviceAuthorizationEnvelope": {
        "type": "object",
        "required": [
          "apiVersion",
          "kind",
          "data",
          "meta"
        ],
        "properties": {
          "apiVersion": {
            "$ref": "#/components/schemas/ApiVersion"
          },
          "kind": {
            "const": "DeviceAuthorization"
          },
          "data": {
            "type": "object",
            "additionalProperties": false,
            "required": [
              "deviceCode",
              "userCode",
              "verificationUri",
              "verificationUriComplete",
              "expiresIn",
              "interval"
            ],
            "properties": {
              "deviceCode": {
                "type": "string"
              },
              "userCode": {
                "type": "string"
              },
              "verificationUri": {
                "type": "string",
                "format": "uri"
              },
              "verificationUriComplete": {
                "type": "string",
                "format": "uri"
              },
              "expiresIn": {
                "type": "integer",
                "const": 600
              },
              "interval": {
                "type": "integer",
                "const": 5
              }
            }
          },
          "meta": {
            "$ref": "#/components/schemas/Meta"
          }
        }
      },
      "DeviceTokenRequest": {
        "type": "object",
