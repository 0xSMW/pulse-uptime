  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "Pulse API or CLI session token",
        "description": "Opaque digest-verified token. The complete secret is shown once and must never be logged."
      },
      "humanSession": {
        "type": "apiKey",
        "in": "cookie",
        "name": "__Host-pulse_session",
        "description": "First-party administrator session used by the web application."
      }
    },
    "parameters": {
      "RequestId": {
        "name": "X-Request-ID",
        "in": "header",
        "required": false,
        "schema": {
          "type": "string",
          "format": "uuid"
        },
        "description": "Caller correlation ID. Pulse generates one when absent or invalid."
      },
      "IdempotencyKey": {
        "name": "Idempotency-Key",
        "in": "header",
        "required": true,
        "schema": {
          "type": "string",
          "format": "uuid"
        },
        "description": "Required on every state-mutating request. Missing key yields 400 IDEMPOTENCY_KEY_REQUIRED. Reusing a key with a different request fingerprint yields 409 IDEMPOTENCY_KEY_REUSED. A still-running claim yields 409 REQUEST_IN_PROGRESS. Completed records replay the stored status and body."
      },
      "IfMatch": {
        "name": "If-Match",
        "in": "header",
        "required": true,
        "schema": {
          "type": "string"
        },
        "description": "Quoted baseConfigHash, exactly matching the request body."
      },
      "Cursor": {
        "name": "cursor",
        "in": "query",
        "required": false,
        "schema": {
          "type": "string"
        }
      },
      "Limit": {
        "name": "limit",
        "in": "query",
        "required": false,
        "schema": {
          "type": "integer",
          "minimum": 1,
          "maximum": 100,
          "default": 50
        }
      },
      "MonitorId": {
        "name": "monitorId",
        "in": "path",
        "required": true,
        "schema": {
          "type": "string"
        }
      },
      "DependencyId": {
        "name": "dependencyId",
        "in": "path",
        "required": true,
        "schema": {
          "type": "string",
          "format": "uuid"
        }
      },
      "IncidentId": {
        "name": "incidentId",
        "in": "path",
        "required": true,
        "schema": {
          "type": "string",
          "format": "uuid"
        }
      },
      "ReportId": {
