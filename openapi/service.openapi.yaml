    "/api/v1/me/password": {
      "post": {
        "operationId": "changeAccountPassword",
        "tags": ["Principal"],
        "summary": "Change account password",
        "description": "Session-only: bearer credentials receive 403. Verifies the current password, re-hashes with Argon2id, stamps passwordChangedAt, and revokes every human session including the current one. Compare-and-swaps against the verified digest (409 ACCOUNT_CHANGED on a lost race). The success body signals reauthenticate: true and the Set-Cookie header clears the session cookie so the browser must sign in again. Failed attempts share the sign-in rate-limit buckets.",
        "security": [{"humanSession": []}],
        "parameters": [{"$ref": "#/components/parameters/RequestId"}],
        "requestBody": {"required": true, "content": {"application/json": {"schema": {"$ref": "#/components/schemas/PasswordChangeRequest"}}}},
        "responses": {
          "200": {"description": "Password changed; every human session revoked and the client must reauthenticate", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/PasswordChangeEnvelope"}}}},
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
