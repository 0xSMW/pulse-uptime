      "PasswordChangeEnvelope": {
        "type": "object",
        "additionalProperties": false,
        "required": ["apiVersion", "kind", "data", "meta"],
        "properties": {
          "apiVersion": {"$ref": "#/components/schemas/ApiVersion"},
          "kind": {"const": "PasswordChange"},
          "data": {"$ref": "#/components/schemas/PasswordChange"},
