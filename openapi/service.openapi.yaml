          "enabled",
          "group",
          "groupId",
          "method",
          "intervalMinutes",
          "timeoutMs",
          "expectedStatus",
          "failureThreshold",
          "recoveryThreshold",
          "recipients"
        ],
        "properties": {
          "state": {
            "type": "string"
          },
          "createdAt": {
            "type": "string",
            "format": "date-time"
          },
          "updatedAt": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "Monitor": {
        "type": "object",
        "unevaluatedProperties": false,
        "allOf": [
          {
            "$ref": "#/components/schemas/MonitorFields"
          },
          {
            "$ref": "#/components/schemas/MonitorItemBase"
          }
        ]
      },
      "MonitorListItem": {
        "type": "object",
        "unevaluatedProperties": false,
        "allOf": [
          {
            "$ref": "#/components/schemas/MonitorFields"
          },
          {
            "$ref": "#/components/schemas/MonitorItemBase"
          },
          {
            "type": "object",
            "required": [
              "uptime"
            ],
            "properties": {
              "uptime": {
                "type": ["number", "null"],
                "minimum": 0,
                "maximum": 100,
                "description": "Uptime percent over the most recent completed 24 hour window, matching the dashboard's Uptime 24h. Null until a full day has been observed since activation."
              }
            }
          }
        ]
      },
      "MonitorEnvelope": {
        "type": "object",
        "required": [
          "apiVersion",
          "kind",
          "data",
          "meta"
        ],
        "properties": {
          "apiVersion": {
            "$ref": "#/components/schemas/ApiVersion"
          },
          "kind": {
            "const": "Monitor"
          },
          "data": {
            "$ref": "#/components/schemas/Monitor"
          },
          "meta": {
            "$ref": "#/components/schemas/Meta"
          }
        }
      },
      "MonitorLive": {
        "type": "object",
        "unevaluatedProperties": false,
        "required": ["id", "state", "enabled", "latestLatencyMs", "lastCheckedAt", "p95LatencyMs", "uptime", "coverage", "rangeUnlocked", "firstRun", "latestIncident", "recentIncidents", "recentChecks", "rollupVersion", "acceptedConfigToken", "windowVersion"],
        "properties": {
          "id": {"type": "string", "description": "The monitor this payload describes, so a client merges the live fields only under the matching page after a direct navigation between monitors."},
          "state": {"type": "string"},
          "enabled": {"type": "boolean", "description": "Whether the monitor is enabled. It tracks the registry row, which flips in step with state, so a pause or resume from another session lands on the next poll."},
          "latestLatencyMs": {"type": ["integer", "null"]},
          "lastCheckedAt": {"type": ["string", "null"], "format": "date-time"},
          "p95LatencyMs": {"type": ["integer", "null"]},
          "uptime": {"type": "object", "unevaluatedProperties": false, "required": ["h24", "d7"], "properties": {"h24": {"type": ["number", "null"]}, "d7": {"type": ["number", "null"]}}, "description": "Uptime for the ranges the live poll recomputes. d30 and d90 are absent, so a client keeps the snapshot values. A locked range reports null."},
          "coverage": {"type": "object", "unevaluatedProperties": false, "required": ["h24", "d7"], "properties": {"h24": {"type": ["number", "null"]}, "d7": {"type": ["number", "null"]}}, "description": "Coverage for the ranges the live poll recomputes. d30 and d90 are absent, so a client keeps the snapshot values. A locked range reports null."},
          "rangeUnlocked": {"type": "object", "additionalProperties": {"type": "boolean"}},
          "firstRun": {"type": "object"},
          "latestIncident": {"type": ["object", "null"], "description": "Latest incident summary. Withheld as null unless the principal holds incidents:read."},
          "recentIncidents": {"type": "array", "items": {"type": "object"}, "description": "Recent incident summaries. Withheld as an empty array unless the principal holds incidents:read."},
          "recentChecks": {"type": "array", "items": {"type": "object"}},
          "rollupVersion": {"type": ["string", "null"], "description": "Latest completed rollup bucket start. It advances when a new bucket finalizes."},
          "acceptedConfigToken": {"type": ["string", "null"], "description": "Accepted config snapshot acceptedAt as an opaque change token, not a counter. It advances when a config edit is accepted, so a client refreshes even when no rollup finalizes."},
          "windowVersion": {"type": "string", "format": "date-time", "description": "Completed 15-minute window boundary the h24 and d7 scores read against. It advances every 15 minutes even on a paused monitor, so a client refreshes once to recompute the timeline and chart against the current window."}
        }
      },
      "MonitorLiveEnvelope": {
        "type": "object",
        "required": ["apiVersion", "kind", "data", "meta"],
        "properties": {
          "apiVersion": {"$ref": "#/components/schemas/ApiVersion"},
          "kind": {"const": "MonitorLive"},
