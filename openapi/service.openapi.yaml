        "type": "object",
        "additionalProperties": false,
        "required": [
          "apiVersion",
          "kind",
          "data",
          "meta"
        ],
        "properties": {
          "apiVersion": {
            "$ref": "#/components/schemas/ApiVersion"
          },
          "kind": {
            "const": "Me"
          },
          "data": {
            "$ref": "#/components/schemas/Me"
          },
          "meta": {
            "$ref": "#/components/schemas/Meta"
          }
        }
      },
      "ExpectedStatus": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "minimum",
          "maximum"
        ],
        "description": "Inclusive status range. maximum must be greater than or equal to minimum.",
        "properties": {
          "minimum": {
            "type": "integer",
            "minimum": 100,
            "maximum": 599
          },
          "maximum": {
            "type": "integer",
            "minimum": 100,
            "maximum": 599
          }
        }
      },
      "MonitorFields": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "minLength": 3,
            "maxLength": 64,
            "pattern": "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          },
          "name": {
            "type": "string",
            "minLength": 1,
            "maxLength": 80
          },
          "url": {
            "type": "string",
            "format": "uri",
            "pattern": "^https?://",
            "description": "Public HTTP or HTTPS URL without embedded credentials. Literal private and reserved addresses are rejected."
          },
          "enabled": {
            "type": "boolean"
          },
          "group": {
            "type": [
              "string",
              "null"
            ],
            "minLength": 1,
            "maxLength": 50
          },
          "groupId": {
            "type": ["string", "null"],
            "minLength": 3,
            "maxLength": 64,
            "pattern": "^[a-z0-9]+(?:-[a-z0-9]+)*$",
            "description": "Monitor group id. On update, an explicit null clears the group while an absent field leaves it unchanged."
          },
          "method": {
            "type": "string",
            "enum": [
              "GET",
              "HEAD"
            ]
          },
          "intervalMinutes": {
            "type": "integer",
            "enum": [
              1,
              5,
              10,
              15
            ]
          },
          "timeoutMs": {
            "type": "integer",
            "minimum": 1000,
            "maximum": 15000
          },
          "expectedStatus": {
            "$ref": "#/components/schemas/ExpectedStatus"
          },
          "failureThreshold": {
            "type": "integer",
            "minimum": 1,
            "maximum": 5
          },
          "recoveryThreshold": {
            "type": "integer",
            "minimum": 1,
            "maximum": 5
          },
          "recipients": {
            "type": "array",
            "maxItems": 20,
            "items": {
              "type": "string",
              "format": "email"
            },
            "uniqueItems": true
          }
        }
      },
      "MonitorCreate": {
        "allOf": [
          {
            "$ref": "#/components/schemas/MonitorFields"
          },
          {
            "type": "object",
            "not": {"required": ["group", "groupId"]},
            "required": [
              "id",
              "name",
              "url"
            ]
          }
        ]
