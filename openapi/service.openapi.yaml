        "type": "object",
        "additionalProperties": false,
        "required": [
          "apiVersion",
          "kind",
          "data",
          "meta"
        ],
        "properties": {
          "apiVersion": {
            "$ref": "#/components/schemas/ApiVersion"
          },
          "kind": {
            "const": "Version"
          },
          "data": {
            "type": "object",
            "additionalProperties": false,
            "required": [
              "supportedApiVersions",
              "minimumCliVersion",
              "latestCliVersion"
            ],
            "properties": {
