          "newPassword": {"type": "string", "minLength": 12, "maxLength": 128}
        }
      },
      "PasswordChange": {
        "type": "object",
        "additionalProperties": false,
        "required": ["changed", "reauthenticate"],
        "properties": {
          "changed": {"type": "boolean", "const": true},
          "reauthenticate": {
            "type": "boolean",
            "const": true,
            "description": "Always true on success: every human session was revoked and the session cookie was cleared. The client must sign in again."
          }
        }
