          "403": {
            "$ref": "#/components/responses/ScopeDenied"
          },
          "409": {
            "$ref": "#/components/responses/Conflict"
          },
          "429": {
            "$ref": "#/components/responses/RateLimited"
          },
          "503": {
            "description": "No usable snapshot or provider measurement is available",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorEnvelope"
                }
              }
            },
            "x-error-codes": [
              "DATABASE_HEALTH_UNAVAILABLE"
