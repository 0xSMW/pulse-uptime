        "operationId": "refreshDatabaseHealth",
        "tags": [
          "Database Health"
        ],
        "summary": "Refresh database health",
        "description": "Returns a cached measurement when refresh occurred within the prior 15 minutes. When refresh fails and a prior snapshot exists, that snapshot is returned with refresh.status STALE_FALLBACK.",
