{
  "openapi": "3.1.0",
  "info": {
    "title": "Pulse Uptime API",
    "version": "1.0.0",
    "description": "The stable v1 control plane for Pulse Uptime. All responses use versioned envelopes and all authenticated operations accept human cookie sessions, API tokens, or CLI session bearer tokens."
  },
  "servers": [
    {
      "url": "/",
      "description": "Current Pulse installation"
    }
  ],
  "tags": [
    {
      "name": "Compatibility"
    },
    {
      "name": "Principal"
    },
    {
      "name": "Monitors"
    },
    {
      "name": "Incidents"
    },
    {
      "name": "Status"
    },
    {
      "name": "Configuration"
    },
    {
      "name": "Notifications"
    },
    {
      "name": "Tokens"
    },
    {
      "name": "CLI authorization"
    },
    {
      "name": "Status page"
    },
    {
      "name": "Images"
    },
    {
      "name": "Status reports"
    },
    {
      "name": "Dependencies"
    }
  ],
  "paths": {
    "/api/v1/status-reports": {
      "get": {
        "operationId": "listStatusReports",
        "tags": ["Status reports"],
        "summary": "List status reports",
        "description": "Newest first by creation. State (all|draft|ongoing|resolved) and type (all|incident|maintenance) filters compose independently.",
        "x-required-scopes": ["reports:read"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/Cursor"},
          {"$ref": "#/components/parameters/Limit"},
          {
            "name": "state",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": ["all", "draft", "ongoing", "resolved"],
              "default": "all"
            }
          },
          {
            "name": "type",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": ["all", "incident", "maintenance"],
              "default": "all"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Status report page",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportListEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "post": {
        "operationId": "createStatusReport",
        "tags": ["Status reports"],
        "summary": "Create a status report",
        "description": "Creates the report together with its required first update. Publishes immediately unless draft is true.",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"}
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {"$ref": "#/components/schemas/StatusReportCreateRequest"}
            }
          }
        },
        "responses": {
          "201": {
            "description": "Created status report",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/status-reports/{reportId}": {
      "get": {
        "operationId": "getStatusReport",
        "tags": ["Status reports"],
        "summary": "Get a status report",
        "description": "Detail shape: first updates page (newest first, up to 50) plus updatesCount and updatesNextCursor. Older timeline pages load through GET /api/v1/status-reports/{reportId}/updates.",
        "x-required-scopes": ["reports:read"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/ReportId"}
        ],
        "responses": {
          "200": {
            "description": "Status report with first updates page and truncation metadata",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "patch": {
        "operationId": "updateStatusReport",
        "tags": ["Status reports"],
        "summary": "Edit a status report",
        "description": "Edits the title, window, or affected monitors. The affected array is a full replacement and is re-snapshotted from the monitor registry.",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"$ref": "#/components/parameters/ReportId"}
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {"$ref": "#/components/schemas/StatusReportPatchRequest"}
            }
          }
        },
        "responses": {
          "200": {
            "description": "Updated status report",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "delete": {
        "operationId": "deleteStatusReport",
        "tags": ["Status reports"],
        "summary": "Delete a status report",
        "description": "Deletes the report and its updates. Published reports disappear from the public status page.",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"$ref": "#/components/parameters/ReportId"}
        ],
        "responses": {
          "200": {
            "description": "Deletion confirmation",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportDeletedEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/status-reports/{reportId}/publish": {
      "post": {
        "operationId": "publishStatusReport",
        "tags": ["Status reports"],
        "summary": "Publish a draft status report",
        "description": "One-way: sets publishedAt once. Publishing an already-published report fails with ALREADY_PUBLISHED.",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"$ref": "#/components/parameters/ReportId"}
        ],
        "responses": {
          "200": {
            "description": "Published status report",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/status-reports/{reportId}/updates": {
      "get": {
        "operationId": "listStatusReportUpdates",
        "tags": ["Status reports"],
        "summary": "List report updates",
        "description": "Cursor-paginated timeline for one report. Newest first by (publishedAt, createdAt, id). Default limit 50, max 100. Pass updatesNextCursor from a detail response (or nextCursor from a prior page) as cursor to load older updates.",
        "x-required-scopes": ["reports:read"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/ReportId"},
          {"$ref": "#/components/parameters/Cursor"},
          {"$ref": "#/components/parameters/Limit"}
        ],
        "responses": {
          "200": {
            "description": "Update page",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportUpdateListEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "post": {
        "operationId": "addStatusReportUpdate",
        "tags": ["Status reports"],
        "summary": "Post a report update",
        "description": "Appends a timeline update and recomputes the report's resolution from the full update set. Returns the refreshed report (first updates page plus updatesCount and updatesNextCursor).",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"$ref": "#/components/parameters/ReportId"}
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {"$ref": "#/components/schemas/StatusReportUpdateCreateRequest"}
            }
          }
        },
        "responses": {
          "201": {
            "description": "Refreshed status report",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/status-reports/{reportId}/updates/{updateId}": {
      "patch": {
        "operationId": "editStatusReportUpdate",
        "tags": ["Status reports"],
        "summary": "Edit a report update",
        "description": "Edits or backdates an existing update; only changed keys are sent. The report's resolution is recomputed.",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"$ref": "#/components/parameters/ReportId"},
          {"$ref": "#/components/parameters/UpdateId"}
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {"$ref": "#/components/schemas/StatusReportUpdateEditRequest"}
            }
          }
        },
        "responses": {
          "200": {
            "description": "Refreshed status report",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "delete": {
        "operationId": "deleteStatusReportUpdate",
        "tags": ["Status reports"],
        "summary": "Delete a report update",
        "description": "Deletes a timeline update and recomputes the report's resolution. Deleting the only update fails with LAST_UPDATE.",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"$ref": "#/components/parameters/ReportId"},
          {"$ref": "#/components/parameters/UpdateId"}
        ],
        "responses": {
          "200": {
            "description": "Refreshed status report",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/incidents/{incidentId}/promote": {
      "post": {
        "operationId": "promoteIncident",
        "tags": ["Status reports"],
        "summary": "Promote an incident to a draft status report",
        "description": "Creates a DRAFT report prefilled from the auto-detected incident (title, window, affected monitor, sanitized investigating update). Idempotent: promoting the same incident again returns the existing report with 200.",
        "x-required-scopes": ["reports:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"},
          {"$ref": "#/components/parameters/IncidentId"}
        ],
        "responses": {
          "200": {
            "description": "Existing draft report for the incident",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "201": {
            "description": "Newly created draft report",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/StatusReportEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/dependency-catalog": {
      "get": {
        "operationId": "listDependencyCatalog",
        "tags": ["Dependencies"],
        "summary": "List the dependency catalog",
        "description": "Validated presets grouped by category, with installed markers so the add sheet can block duplicates. Never returns provider credentials.",
        "x-required-scopes": ["dependencies:read"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"}
        ],
        "responses": {
          "200": {
            "description": "Catalog grouped by category",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/DependencyCatalogEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/dependencies": {
      "get": {
        "operationId": "listDependencies",
        "tags": ["Dependencies"],
        "summary": "List installed dependencies",
        "description": "Current provider-reported state, active incident title, provider updated time, and a 24-hour observation timeline for each installed dependency.",
        "x-required-scopes": ["dependencies:read"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"}
        ],
        "responses": {
          "200": {
            "description": "Dependency page",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/DependencyListEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "post": {
        "operationId": "addDependency",
        "tags": ["Dependencies"],
        "summary": "Install a dependency",
        "description": "One-click install from a catalog preset. Accepts only presetId, an optional catalog-defined scopeId, and notification settings; never a source URL or upstream component ID.",
        "x-required-scopes": ["dependencies:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"}
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {"$ref": "#/components/schemas/DependencyCreate"}
            }
          }
        },
        "responses": {
          "201": {
            "description": "Installed dependency",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/DependencyEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "409": {"$ref": "#/components/responses/Conflict"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/dependencies/{dependencyId}": {
      "parameters": [
        {"$ref": "#/components/parameters/DependencyId"}
      ],
      "get": {
        "operationId": "getDependency",
        "tags": ["Dependencies"],
        "summary": "Get dependency detail",
        "description": "Current state, incidents with updates, 24-hour and seven-day observation timelines, selected component and region, feed health, and notification setting.",
        "x-required-scopes": ["dependencies:read"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"}
        ],
        "responses": {
          "200": {
            "description": "Dependency detail",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/DependencyEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "patch": {
        "operationId": "updateDependency",
        "tags": ["Dependencies"],
        "summary": "Update dependency notification setting",
        "description": "notificationsEnabled only. Dependency notifications are configured independently from endpoint-monitor notifications.",
        "x-required-scopes": ["dependencies:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"}
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {"$ref": "#/components/schemas/DependencyUpdate"}
            }
          }
        },
        "responses": {
          "200": {
            "description": "Updated dependency",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/DependencyEnvelope"}
              }
            }
          },
          "400": {"$ref": "#/components/responses/BadRequest"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      },
      "delete": {
        "operationId": "removeDependency",
        "tags": ["Dependencies"],
        "summary": "Remove a dependency",
        "description": "Soft removal: closes the open state interval. History is preserved for prior incident overlap context.",
        "x-required-scopes": ["dependencies:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"}
        ],
        "responses": {
          "204": {"description": "Dependency removed"},
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/dependencies/{dependencyId}/refresh": {
      "post": {
        "operationId": "scheduleDependencyPoll",
        "tags": ["Dependencies"],
        "summary": "Request an immediate refresh",
        "description": "Sets the dependency's source next_poll_at to now; the dependency cron performs the fetch. Never fetches inline.",
        "x-required-scopes": ["dependencies:write"],
        "security": [
          {"bearerAuth": []},
          {"humanSession": []}
        ],
        "parameters": [
          {"$ref": "#/components/parameters/DependencyId"},
          {"$ref": "#/components/parameters/RequestId"},
          {"$ref": "#/components/parameters/IdempotencyKey"}
        ],
        "responses": {
          "202": {
            "description": "Refresh scheduled",
            "content": {
              "application/json": {
                "schema": {"$ref": "#/components/schemas/DependencyRefreshEnvelope"}
              }
            }
          },
          "401": {"$ref": "#/components/responses/AuthenticationRequired"},
          "403": {"$ref": "#/components/responses/ScopeDenied"},
          "404": {"$ref": "#/components/responses/NotFound"},
          "429": {"$ref": "#/components/responses/RateLimited"}
        }
      }
    },
    "/api/v1/version": {
      "get": {
        "operationId": "getVersion",
        "tags": [
          "Compatibility"
        ],
        "summary": "Get API compatibility",
        "security": [],
        "parameters": [
          {
            "$ref": "#/components/parameters/RequestId"
          }
        ],
        "responses": {
          "200": {
            "description": "Supported API and CLI versions",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/VersionEnvelope"
                }
              }
            }
          }
        }
      }
    },
    "/api/v1/me": {
      "get": {
        "operationId": "getCurrentPrincipal",
        "tags": [
          "Principal"
        ],
        "summary": "Get current principal",
        "security": [
          {
            "bearerAuth": []
          },
          {
            "humanSession": []
          }
        ],
        "parameters": [
          {
            "$ref": "#/components/parameters/RequestId"
          }
        ],
        "responses": {
          "200": {
            "description": "Authenticated principal without credential material",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/MeEnvelope"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/AuthenticationRequired"
          },
          "429": {
            "$ref": "#/components/responses/RateLimited"
          }
        }
      },
      "patch": {
        "operationId": "updateAccountProfile",
        "tags": ["Principal"],
        "summary": "Update account profile",
        "description": "Session-only: bearer credentials receive 403. Updates the administrator's display name and account time zone.",
