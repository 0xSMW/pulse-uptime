            "type": "string",
            "writeOnly": true
          }
        }
      },
      "DeviceTokenEnvelope": {
        "type": "object",
        "required": [
          "apiVersion",
          "kind",
          "data",
          "meta"
        ],
        "properties": {
          "apiVersion": {
            "$ref": "#/components/schemas/ApiVersion"
          },
          "kind": {
            "const": "CliSession"
          },
          "data": {
            "type": "object",
            "additionalProperties": false,
            "required": [
