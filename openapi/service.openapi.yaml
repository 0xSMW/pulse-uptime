    "schemas": {
      "ApiVersion": {
        "type": "string",
        "const": "v1"
      },
      "Scope": {
        "type": "string",
        "enum": [
          "monitors:read",
          "monitors:write",
          "incidents:read",
          "config:read",
          "config:write",
          "notifications:test",
          "tokens:manage",
          "status:read"
        ]
      },
      "Meta": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "requestId"
        ],
        "properties": {
          "requestId": {
            "type": "string"
          },
          "configHash": {
            "type": "string",
            "pattern": "^sha256:[0-9a-f]{64}$"
          }
        }
      },
      "ListMeta": {
        "type": "object",
        "additionalProperties": false,
        "required": [
